[pytest]
# Test cho pure logic (không cần DB) — chạy nhanh trong CI.
# Test cần DB đánh dấu @pytest.mark.db (skip khi không có MySQL).
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --strict-markers
markers =
    db: test cần kết nối MySQL/Postgres (skip nếu không có DB)
